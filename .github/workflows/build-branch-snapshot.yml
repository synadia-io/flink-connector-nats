name: Build a Branch Specific Snapshot

# Manually-triggered SNAPSHOT build for the branch/tag named in the input.
# This workflow lives on main; type the branch to build (e.g. 2.x) when running.
# Publishes <jarVersion>-SNAPSHOT, where jarVersion comes from build.gradle on
# the checked-out ref (e.g. "2.3.2-SNAPSHOT" when run against the 2.x branch).
#
# NOTE: This intentionally does NOT set BRANCH_REF_NAME. This project's
# build.gradle derives the version solely from jarVersion + "-SNAPSHOT", so the
# branch name is not appended (no "...-branch-SNAPSHOT"). BUILD_EVENT is the
# event name ("workflow_dispatch", not "release"), so isRelease is false and the
# build stays a SNAPSHOT.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch or tag to build a snapshot from (e.g. 2.x)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_EVENT: ${{ github.event_name }}
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14' # Quotes required to prevent YAML converting to number
      - name: Setup GO
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install Nats Server
        run: |
          pkill -9 nats-server 2>/dev/null || true
          mkdir -p ~/.local/bin
          cd $GITHUB_WORKSPACE
          git clone https://github.com/nats-io/nats-server.git
          cd nats-server
          go build -o ~/.local/bin/nats-server
          nats-server -v
      - name: Check out code
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch }}
      - name: Build and Test
        run: chmod +x gradlew && ./gradlew clean test
      - name: Verify Javadoc
        if: ${{ success() }}
        run: ./gradlew javadoc
      - name: Publish Branch Snapshot
        if: ${{ success() }}
        run: ./gradlew -i publishToSonatype
      - name: Clean up
        if: always()
        run: pkill -9 nats-server 2>/dev/null || true
