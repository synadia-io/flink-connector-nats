name: Build V2 Release

# Manually-triggered release build for the V2 maintenance line (2.x.x), always
# built from the V2-Main branch — without going through a GitHub Release on the
# default branch. The published version comes from `jarVersion` in build.gradle
# on V2-Main.
#
# If main ever moves to a new major (e.g. 4.x), copy this file to
# build-v3-release.yml and change the checkout ref to the V3 maintenance branch.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_EVENT: 'release'
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      GODEBUG: x509sha1=1
    steps:
      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14' # Quotes required to prevent YAML converting to number
      - name: Setup GO
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install Nats Server
        run: |
          pkill -9 nats-server 2>/dev/null || true
          mkdir -p ~/.local/bin
          cd $GITHUB_WORKSPACE
          git clone https://github.com/nats-io/nats-server.git
          cd nats-server
          go build -o ~/.local/bin/nats-server
          nats-server -v
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: V2-Main
      - name: Build and Test
        run: chmod +x gradlew && ./gradlew clean test
      - name: Verify, Sign and Publish Release
        run: ./gradlew -i signArchives signMavenJavaPublication publishToSonatype closeAndReleaseSonatypeStagingRepository
      - name: Clean up
        if: always()
        run: pkill -9 nats-server 2>/dev/null || true
