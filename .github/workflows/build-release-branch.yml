name: Build Release Branch

# Manually-triggered release build for a specific branch or tag.
# Use this to cut maintenance/patch releases (e.g. 2.x) without going through
# a GitHub Release on the default branch. The published version comes from
# `jarVersion` in build.gradle on the checked-out ref, NOT from this input.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch or tag to build and release (e.g. 2.x)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_EVENT: 'release'
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14' # Quotes required to prevent YAML converting to number
      - name: Setup GO
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install Nats Server
        run: |
          pkill -9 nats-server 2>/dev/null || true
          mkdir -p ~/.local/bin
          cd $GITHUB_WORKSPACE
          git clone https://github.com/nats-io/nats-server.git
          cd nats-server
          go build -o ~/.local/bin/nats-server
          nats-server -v
      - name: Check out code
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch }}
      - name: Build and Test
        run: chmod +x gradlew && ./gradlew clean test
      - name: Verify, Sign and Publish Release
        run: ./gradlew -i publishToSonatype closeAndReleaseSonatypeStagingRepository
      - name: Clean up
        if: always()
        run: pkill -9 nats-server 2>/dev/null || true
